<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand mb-0 h1">💰 Expense Tracker</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h3>Edit Expense</h3>

            <form action="/update-expense" method="post">

                <input type="hidden"
                       name="id"
                       th:value="${expense.id}">

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text"
                           name="title"
                           class="form-control"
                           th:value="${expense.title}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <input type="number"
                           name="amount"
                           class="form-control"
                           th:value="${expense.amount}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-control" required>
    <option th:selected="${expense.category == 'Food'}" value="Food">Food</option>
    <option th:selected="${expense.category == 'Travel'}" value="Travel">Travel</option>
    <option th:selected="${expense.category == 'Shopping'}" value="Shopping">Shopping</option>
    <option th:selected="${expense.category == 'Bills'}" value="Bills">Bills</option>
    <option th:selected="${expense.category == 'Education'}" value="Education">Education</option>
    <option th:selected="${expense.category == 'Health'}" value="Health">Health</option>
    <option th:selected="${expense.category == 'Entertainment'}" value="Entertainment">Entertainment</option>
    <option th:selected="${expense.category == 'Other'}" value="Other">Other</option>
</select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date"
                           name="expenseDate"
                           class="form-control"
                           th:value="${expense.expenseDate}"
                           required>
                </div>

                <button class="btn btn-success">
                    Update Expense
                </button>

                <a href="/"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
